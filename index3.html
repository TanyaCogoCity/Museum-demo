<!DOCTYPE html>
<html>
<head>
  <title>Museum Visitor Intelligence</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; background:#f5f7fb; margin:20px; }
    .card { background:white; padding:20px; margin-bottom:20px; border-radius:10px; }
    input, select { width:100%; padding:8px; margin:5px 0; }
    button { padding:10px 15px; background:#4CAF50; color:white; border:none; border-radius:6px; }
    .hidden { display:none; }
    .topbar { display:flex; justify-content:space-between; }
  </style>
</head>

<body>

<div class="topbar">
  <h2>Museum Visitor Intelligence</h2>
  <button onclick="showAdmin()">Admin</button>
</div>

<!-- HOME -->
<div id="home" class="card">
  <h3>Visitor Check-In</h3>

  <input id="name" placeholder="First Name">
  <input id="email" placeholder="Email">
  <input id="zip" placeholder="ZIP">

  <select id="source">
    <option>Walk-by</option>
    <option>Google</option>
    <option>Social</option>
    <option>Friend</option>
    <option>Event</option>
  </select>

  <button onclick="submitVisitor()">Submit</button>
</div>

<!-- LOGIN -->
<div id="login" class="card hidden">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">

  <div class="card">
    <h3>Date Filter</h3>
    <input type="date" id="start">
    <input type="date" id="end">
    <button onclick="render()">Apply</button>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("museumData") || "[]");

function submitVisitor(){
  const entry = {
    source: document.getElementById("source").value,
    date: new Date()
  };

  data.push(entry);
  localStorage.setItem("museumData", JSON.stringify(data));

  alert("Visitor added!");
}

function showAdmin(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}

function login(){
  if(document.getElementById("pass").value === "demo"){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("admin").classList.remove("hidden");
    render();
  } else {
    alert("Wrong password");
  }
}

function getFiltered(){
  let start = new Date(document.getElementById("start").value);
  let end = new Date(document.getElementById("end").value);

  return data.filter(d=>{
    let date = new Date(d.date);
    return (!isNaN(start)?date>=start:true) &&
           (!isNaN(end)?date<=end:true);
  });
}

function render(){

  let dataset = getFiltered();

  let counts = {};

  dataset.forEach(d=>{
    counts[d.source] = (counts[d.source]||0)+1;
  });

  if(window.chartInstance){
    window.chartInstance.destroy();
  }

  window.chartInstance = new Chart(document.getElementById("chart"), {
    type:'bar',
    data:{
      labels:Object.keys(counts),
      datasets:[{
        label:"Visitors",
        data:Object.values(counts)
      }]
    }
  });
}

</script>

</body>
</html>
